name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  character-manager:
    name: character-manager checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        working-directory: character-manager
        run: uv sync --group dev

      - name: pytest
        working-directory: character-manager
        run: uv run pytest

      - name: ruff
        working-directory: character-manager
        run: uv run ruff check src/ tests/

      - name: pylint
        working-directory: character-manager
        run: uv run pylint src/

      - name: mypy
        working-directory: character-manager
        run: uv run mypy src/
